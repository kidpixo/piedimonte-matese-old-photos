# Setup
title:               'Il Cotonificio Egg di Piedimonte Matese'
tagline:             'Una Storia Industriale e Sociale Attraverso le Mappe'
description:         'La storia del Cotonificio Egg di Piedimonte Matese, esplorando la sua evoluzione industriale e sociale attraverso mappe interattive e dati storici.'
url:                 'https://kidpixo.github.io/piedimonte-matese-old-photos/'
baseurl:             ''  # Empty if deployed at root, or '/repo-name' if project site

permalink:           pretty

# About/contact
author:
  name:              Mario D'Amore
  # url:               https://twitter.com/mdo
  email:             maariodamore77@gmail.com

# Custom vars
version:             1.1.0
# google_analytics_id: #UA-XXXX-Y

# CDN Libraries (Single Source of Truth)
# SRI hashes: Generate via https://www.srihash.org/
cdn_libs:
  # Core mapping library
  leaflet_css: "https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"
  leaflet_js: "https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js"
  
  # Utilities
  jquery: "https://code.jquery.com/jquery-3.6.0.min.js"
  bootstrap_css: "https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css"
  bootstrap_js: "https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/js/bootstrap.bundle.min.js"
  
  # Leaflet plugins
  georaster: "https://cdn.jsdelivr.net/npm/georaster@1.6.0/dist/georaster.browser.bundle.min.js"
  georaster_layer: "https://cdn.jsdelivr.net/npm/georaster-layer-for-leaflet@3.10.0/dist/v3/webpack/bundle/georaster-layer-for-leaflet.min.js"
  leaflet_bing: "https://cdn.jsdelivr.net/npm/leaflet-bing-layer@3.3.1/leaflet-bing-layer.min.js"
  leaflet_locate_css: "https://cdnjs.cloudflare.com/ajax/libs/leaflet-locatecontrol/0.83.1/L.Control.Locate.css"
  leaflet_locate_js: "https://cdnjs.cloudflare.com/ajax/libs/leaflet-locatecontrol/0.83.1/L.Control.Locate.min.js"

collections:
  photos:
    output: true
    permalink: /photos/:slug/
  topics:
    output: true
    permalink: /topics/:slug/

# Explicitly exclude the raw data so Jekyll doesn't try to build it
exclude:
  - archive
  - raw_data/
  - scripts/
  - vendor/
  - Makefile
  - Dockerfile
  - docker-compose.yml
